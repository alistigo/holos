<!DOCTYPE html>
<!--
  Per the per-language-bundle architecture (research doc §9), the active
  locale is fixed at build time via the LOCALE env var. The boot module
  (`src/i18n.ts`) sets `<html lang>` and `<html dir>` from the baked
  locale before React mounts — so the placeholder values below don't
  need per-locale variants.
-->
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alistigo — Iframe</title>
  </head>
  <body>
    <!--
      The Alistigo document is read from this tag at boot. In production, the
      host (or a static-site step) writes the JSON-LD document inline. In
      tests, `driver-playwright` rewrites this tag via `page.route()` to seed
      the scenario's fixture. In dev, an empty document is shipped here and
      the playground host form's Document selector writes this tag via the
      ?document= URL param before auto-mount.
    -->
    <script type="application/json" id="alistigo-document">
      {
        "@context": { "@vocab": "https://schema.org/", "alistigo": "https://alistigo.ai/vocab/" },
        "@type": "ItemList",
        "alistigo:listId": "lst_00000000000000000000000000",
        "alistigo:schemaVersion": "1.0.0",
        "itemListElement": [],
        "alistigo:listEventLog": [
          {
            "alistigo:listEventId": "lev_00000000000000000000000001",
            "alistigo:eventType": "ListCreated",
            "alistigo:listId": "lst_00000000000000000000000000",
            "alistigo:actorId": "act_00000000000000000000000000",
            "alistigo:timestamp": "2026-01-01T00:00:00.000Z"
          }
        ]
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
